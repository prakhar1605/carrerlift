<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NaukriChakri — Your Gateway to Dream Jobs</title>
  <meta name="description" content="Professional student job portal with live updates from Google Sheets" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* (Same CSS as you already have, trimmed for brevity) */
    :root{--primary:#0066ff;--primary-light:#338eff;--secondary:#00d4ff;--bg-main:#fafbfc;--bg-card:#fff;--text-primary:#1a1d29;--text-secondary:#4a5568;--border:#e4e7eb;--radius:20px;--radius-sm:14px;font-family:'Inter',sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#ffffff;color:var(--text-primary)}
    .container{max-width:1280px;margin:0 auto;padding:24px}
    .header{text-align:center;margin-bottom:24px}
    .logo{font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .tagline{color:var(--text-secondary);margin-top:6px}
    .control-bar{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;padding:12px;background:var(--bg-card);border-radius:var(--radius);border:2px solid var(--border);align-items:center;margin-bottom:20px}
    input[type=search]{padding:12px 12px 12px 44px;border-radius:12px;border:1px solid transparent;background:#f5f7fa;width:100%}
    select{padding:10px;border-radius:12px;border:1px solid var(--border)}
    .job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
    .job-card{background:var(--bg-card);border-radius:16px;padding:18px;border:1px solid var(--border);box-shadow:0 6px 20px rgba(0,0,0,0.04)}
    .company-name{font-weight:800;font-size:16px}
    .role-title{font-weight:700;color:var(--text-secondary);margin-top:8px}
    .meta-item{font-size:13px;color:var(--text-secondary);margin-top:8px}
    .action-buttons{display:flex;gap:10px;margin-top:12px}
    .btn{padding:10px 14px;border-radius:12px;border:none;cursor:pointer;font-weight:700}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
    .btn-secondary{background:#f5f7fa;color:var(--text-primary);border:1px solid var(--border)}
    .side-panel{margin-top:18px;padding:14px;background:#fff;border-radius:12px;border:1px solid var(--border)}
    .analysis-result{white-space:pre-wrap;font-size:14px;color:var(--text-secondary)}
    .matches-list{margin-top:12px;display:flex;flex-direction:column;gap:10px}
    .match-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:10px;border:1px solid var(--border);background:#fafcff}
    .badge{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:6px 10px;border-radius:999px;font-weight:800}
    @media (max-width:900px){.control-bar{grid-template-columns:1fr;row-gap:8px}.job-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">NaukriChakri</h1>
      <p class="tagline">Discover jobs in real-time — now with AI resume matching</p>
    </header>

    <!-- Controls -->
    <div class="control-bar" role="region" aria-label="Search and filters">
      <div style="position:relative">
        <input id="search" type="search" placeholder="Search companies, roles, locations..." aria-label="Search jobs" />
      </div>

      <select id="locationFilter" aria-label="Filter by location">
        <option value="">All Locations</option>
      </select>

      <select id="typeFilter" aria-label="Filter by job type">
        <option value="">All Job Types</option>
      </select>

      <select id="sortSelect" aria-label="Sort jobs">
        <option value="new">Latest First</option>
        <option value="old">Oldest First</option>
      </select>
    </div>

    <!-- Resume Uploader / Analyzer -->
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
      <input id="resumeFile" type="file" accept=".txt,.md,.json,.text" />
      <button id="uploadAnalyzeBtn" class="btn btn-primary">Upload & Analyze</button>
      <button id="pasteOpenBtn" class="btn btn-secondary">Paste Resume</button>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div class="badge" id="matchCount">— Matches</div>
      </div>
    </div>

    <!-- Optional paste modal (simple) -->
    <div id="pasteBox" style="display:none;margin-bottom:16px">
      <textarea id="resumePaste" rows="6" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border)"></textarea>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button id="pasteAnalyzeBtn" class="btn btn-primary">Analyze Pasted Resume</button>
        <button id="pasteCancelBtn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>

    <!-- Two-column layout: left = jobs, right = AI + matches -->
    <div style="display:grid;grid-template-columns:1fr 350px;gap:20px;align-items:start">
      <!-- Left: job grid -->
      <div>
        <div id="grid" class="job-grid" role="list" aria-live="polite">
          <!-- job cards injected here -->
        </div>
      </div>

      <!-- Right: AI Analysis & Top matches -->
      <aside class="side-panel" aria-label="AI Analysis and Matches">
        <h3 style="margin-bottom:8px">AI Resume Analysis</h3>
        <div id="analysis" class="analysis-result">Upload or paste your resume — click Analyze to get suggestions.</div>

        <h4 style="margin-top:12px">Top Matches</h4>
        <div id="matches" class="matches-list">
          <!-- top matches injected here -->
        </div>
      </aside>
    </div>

    <footer style="margin-top:28px;text-align:center;color:#718096">
      <small>Make sure your Google Sheet is published and shared (Anyone with link - Viewer). <strong>Vercel API</strong> must be deployed.</small>
    </footer>
  </div>

  <script>
    /***** CONFIG *****/
    const SHEET_ID = '1X412u-aXPAzkKqwRn0PgvbjcWMaivWJx-FlyHb6LARc'; // update if needed
    const GID = '0';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

    /***** UTILITIES *****/
    function sanitizeText(s=''){ return String(s).replace(/\s+/g,' ').trim(); }

    // Simple keyword extractor: top N frequent words length>3 (excludes common stopwords)
    function extractKeywords(text, topN=30) {
      if (!text) return [];
      const stop = new Set(['which','that','with','this','from','your','about','their','have','will','they','would','there','these','those','have','able','please','including','experience','role','work','workplace','skills','requirement']);
      const words = text.toLowerCase().match(/\b[a-zA-Z0-9+#.+-]{4,}\b/g) || [];
      const freq = {};
      words.forEach(w => {
        if (stop.has(w)) return;
        freq[w] = (freq[w]||0)+1;
      });
      return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,topN).map(x=>x[0]);
    }

    function scoreJob(job, keywords){
      if (!keywords || keywords.length===0) return 0;
      const hay = `${job.Company||''} ${job.Role||''} ${job.Description||''} ${job.JobType||''}`.toLowerCase();
      let score = 0;
      keywords.forEach(k => {
        if (hay.includes(k)) score += 1;
      });
      // small bonus if role word occurs
      if (job.Role) {
        const roleWords = (job.Role||'').toLowerCase().split(/\s+/);
        roleWords.forEach(rw => { if (keywords.includes(rw)) score += 0.5; });
      }
      return score;
    }

    /***** SHEET FETCH *****/
    async function fetchSheet(){
      try {
        const r = await fetch(SHEET_URL);
        const t = await r.text();
        const jsonText = t.substring(t.indexOf('{'), t.lastIndexOf(')'));
        const parsed = JSON.parse(jsonText);
        const cols = parsed.table.cols.map(c => (c.label||'').trim());
        const rows = parsed.table.rows.map(row => row.c ? row.c.map(cell => cell ? cell.v : '') : []);
        const items = rows.map(rw => {
          const o = {};
          cols.forEach((c,i) => { o[c||`col${i}`] = rw[i] || ''; });
          return o;
        }).filter(it => it['Company'] && String(it['Company']).trim() !== '');
        return items;
      } catch (e) {
        console.error('sheet fetch error', e);
        throw e;
      }
    }

    /***** RENDERING JOBS *****/
    function createJobCard(job){
      const div = document.createElement('div');
      div.className = 'job-card';
      div.tabIndex = 0;
      div.innerHTML = `
        <div class="company-name">${job.Company || '—'}</div>
        <div class="role-title">${job.Role || 'Position'}</div>
        <div class="meta-item">📍 ${job.Location || 'TBD'} &nbsp; • &nbsp; ${job.Stipend || ''}</div>
        <div style="margin-top:10px;font-size:13px;color:#59606b">${(job.Description||'').slice(0,200)}</div>
        <div class="action-buttons">
          ${job.ApplyLink ? `<a class="btn btn-primary" href="${job.ApplyLink}" target="_blank" rel="noopener noreferrer">Apply</a>` : ''}
          ${job.Email ? `<a class="btn btn-secondary" href="mailto:${job.Email}">Email</a>` : ''}
        </div>
      `;
      return div;
    }

    function renderJobs(jobs){
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if (!jobs || jobs.length===0) {
        grid.innerHTML = '<div style="padding:60px;text-align:center;color:#9aa4b2">No jobs found</div>';
        return;
      }
      jobs.forEach(j => grid.appendChild(createJobCard(j)));
    }

    /***** FILTERS + SEARCH *****/
    function populateFilters(jobs){
      const locSet = new Set(), typeSet = new Set();
      jobs.forEach(j => { if (j.Location) locSet.add(j.Location); if (j.JobType) typeSet.add(j.JobType); });
      const locSel = document.getElementById('locationFilter'); locSel.innerHTML = '<option value="">All Locations</option>';
      Array.from(locSet).sort().forEach(l => { const o = document.createElement('option'); o.value=l; o.textContent=l; locSel.appendChild(o); });
      const tSel = document.getElementById('typeFilter'); tSel.innerHTML = '<option value="">All Job Types</option>';
      Array.from(typeSet).sort().forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent=t; tSel.appendChild(o); });
    }

    function setupControls(allJobs){
      const search = document.getElementById('search');
      const locSel = document.getElementById('locationFilter');
      const typeSel = document.getElementById('typeFilter');
      const sortSel = document.getElementById('sortSelect');

      function apply(){
        const q = search.value.trim().toLowerCase();
        const loc = locSel.value;
        const typ = typeSel.value;
        const sort = sortSel.value;
        let filtered = allJobs.filter(job => {
          const hay = `${job.Company} ${job.Role} ${job.Location} ${job.Stipend} ${job.Description}`.toLowerCase();
          const okQ = !q || hay.includes(q);
          const okLoc = !loc || (job.Location === loc);
          const okType = !typ || (job.JobType === typ);
          return okQ && okLoc && okType;
        });
        filtered.sort((a,b) => {
          const pa = parseDate(a.PostedDate), pb = parseDate(b.PostedDate);
          return sort === 'old' ? pa - pb : pb - pa;
        });
        renderJobs(filtered);
      }

      [search, locSel, typeSel, sortSel].forEach(el => el.addEventListener('input', apply));
      apply();
    }

    /***** DATE PARSE (robust) *****/
    function parseDate(ds){
      if (!ds) return 0;
      const t = Date.parse(ds);
      if (!isNaN(t)) return t;
      const parts = String(ds).trim().split(/[\s,/-]+/).filter(Boolean);
      if (parts.length >=3){
        const d = parseInt(parts[0]);
        const m = {'jan':0,'feb':1,'mar':2,'apr':3,'may':4,'jun':5,'jul':6,'aug':7,'sep':8,'oct':9,'nov':10,'dec':11}[parts[1].substr(0,3).toLowerCase()] || 0;
        const y = parseInt(parts[2]);
        return new Date(y,m,d).getTime();
      }
      return 0;
    }

    /***** AI ANALYSIS (call Vercel API) *****/
    async function callAnalyzeAPI(text){
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ resume: text })
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({message:'server error'}));
          throw new Error(err.error || err.message || 'Analysis failed');
        }
        const data = await res.json();
        return data.result || '';
      } catch (e) {
        console.error('analyze api error', e);
        throw e;
      }
    }

    /***** MATCHING LOGIC: take AI text => keywords => score jobs => show top N *****/
    function showMatches(aiText, jobs, topN=6){
      const keywords = extractKeywords(aiText, 40);
      const scored = jobs.map(j => ({ j, score: scoreJob(j, keywords) }));
      scored.sort((a,b)=>b.score - a.score);
      const top = scored.filter(s=>s.score>0).slice(0, topN);
      const matchesEl = document.getElementById('matches');
      matchesEl.innerHTML = '';
      document.getElementById('matchCount').textContent = `${top.length} Matches`;
      if (top.length === 0) {
        matchesEl.innerHTML = '<div style="color:#9aa4b2">No strong matches found — try relaxing filters or check other jobs</div>';
        return;
      }
      top.forEach(item => {
        const el = document.createElement('div'); el.className='match-item';
        el.innerHTML = `
          <div>
            <div style="font-weight:800">${item.j.Company}</div>
            <div style="font-size:13px;color:#59606b">${item.j.Role || ''} • ${item.j.Location || ''}</div>
          </div>
          <div style="text-align:right">
            <div class="badge">${item.score}</div>
            ${item.j.ApplyLink ? `<div style="margin-top:6px"><a class="btn btn-primary" href="${item.j.ApplyLink}" target="_blank" rel="noopener noreferrer">Apply</a></div>` : ''}
          </div>
        `;
        matchesEl.appendChild(el);
      });
    }

    /***** UI: Analyze flow (upload or paste) *****/
    document.getElementById('uploadAnalyzeBtn').addEventListener('click', async () => {
      const f = document.getElementById('resumeFile').files[0];
      if (!f) return alert('Choose a .txt file or paste your resume using "Paste Resume"');
      // best for .txt
      try {
        const text = await f.text();
        await analyzeAndMatch(text);
      } catch (e) {
        alert('Could not read file. Use plain .txt or paste the resume text.');
      }
    });

    document.getElementById('pasteOpenBtn').addEventListener('click', () => {
      const box = document.getElementById('pasteBox');
      box.style.display = 'block';
      document.getElementById('resumePaste').focus();
    });
    document.getElementById('pasteCancelBtn').addEventListener('click', () => {
      document.getElementById('pasteBox').style.display = 'none';
      document.getElementById('resumePaste').value = '';
    });
    document.getElementById('pasteAnalyzeBtn').addEventListener('click', async () => {
      const t = document.getElementById('resumePaste').value.trim();
      if (!t) return alert('Paste your resume text first.');
      await analyzeAndMatch(t);
      document.getElementById('pasteBox').style.display = 'none';
    });

    async function analyzeAndMatch(text){
      const analysisEl = document.getElementById('analysis');
      analysisEl.textContent = 'Analyzing — please wait...';
      try {
        const aiResult = await callAnalyzeAPI(text);
        analysisEl.textContent = aiResult;
        // fetch jobs (cached)
        const jobs = window._jobsCache || await fetchSheet().then(js => { window._jobsCache = js; return js });
        showMatches(aiResult, jobs, 6);
      } catch (e) {
        analysisEl.textContent = 'AI analysis failed: ' + (e.message || e);
      }
    }

    /***** INIT: fetch sheet, populate UI *****/
    async function init(){
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div style="padding:40px;text-align:center;color:#9aa4b2">Loading jobs...</div>';
      try {
        const jobs = await fetchSheet();
        window._jobsCache = jobs;
        populateFilters(jobs);
        setupControls(jobs);
      } catch (e) {
        grid.innerHTML = `<div style="padding:40px;text-align:center;color:#c04">Unable to load jobs — check sheet publish/share settings.<br/><small>${e.message || ''}</small></div>`;
        console.error(e);
      }
    }

    // start
    init();
  </script>
</body>
</html>
