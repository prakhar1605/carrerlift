<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NaukriChakri - Find Your Dream Job</title>
  <meta name="description" content="Professional job portal with AI-powered resume matching" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0A66C2;
      --primary-hover: #004182;
      --secondary: #378FE9;
      --success: #057642;
      --danger: #CC1016;
      --warning: #F5A623;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-muted: #9E9E9E;
      --border: #D9D9D9;
      --bg-white: #FFFFFF;
      --bg-gray: #F3F2F0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 8px rgba(0,0,0,0.1);
      --shadow-lg: 0 8px 16px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-gray);
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* Header */
    .header {
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* Search Section */
    .search-section {
      background: var(--bg-white);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
    }

    .search-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search-input-wrapper {
      position: relative;
      flex: 1;
      min-width: 250px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(10, 102, 194, 0.1);
    }

    .filter-select {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      cursor: pointer;
      min-width: 150px;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Resume Upload Card */
    .resume-card {
      background: linear-gradient(135deg, #0A66C2 0%, #378FE9 100%);
      border-radius: 8px;
      padding: 32px 24px;
      margin-bottom: 24px;
      color: white;
      box-shadow: var(--shadow-md);
    }

    .resume-card-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .resume-card-subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .upload-area {
      background: rgba(255, 255, 255, 0.15);
      border: 2px dashed rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 16px;
    }

    .upload-area:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .upload-area.dragover {
      background: rgba(255, 255, 255, 0.25);
      border-color: white;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .upload-text {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .upload-hint {
      font-size: 13px;
      opacity: 0.8;
    }

    .file-name-display {
      background: rgba(255, 255, 255, 0.2);
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .upload-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Buttons */
    .btn {
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: white;
      color: var(--primary);
    }

    .btn-primary:hover:not(:disabled) {
      background: #f8f9fa;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-link {
      background: transparent;
      color: white;
      text-decoration: underline;
      padding: 8px 16px;
    }

    /* Analysis Section */
    .analysis-section {
      background: var(--bg-white);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      display: none;
    }

    .analysis-section.active {
      display: block;
    }

    .analysis-section.collapsed .analysis-content {
      display: none;
    }

    .btn-toggle {
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-toggle:hover {
      background: var(--bg-gray);
    }

    .btn-toggle i {
      transition: transform 0.3s;
    }

    .analysis-section.collapsed .btn-toggle i {
      transform: rotate(180deg);
    }

    .analysis-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .analysis-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .match-count {
      background: var(--primary);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .analysis-content {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }

    /* Jobs Section */
    .jobs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .jobs-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .jobs-count {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .jobs-grid {
      display: grid;
      gap: 16px;
    }

    /* Job Card */
    .job-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .job-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }

    .job-card.matched {
      border-left: 4px solid var(--primary);
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 12px;
    }

    .job-info {
      flex: 1;
    }

    .company-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .role-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .match-score {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .job-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .job-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .job-meta-item i {
      color: var(--text-muted);
      font-size: 13px;
    }

    .job-description {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .job-actions {
      display: flex;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .btn-apply {
      flex: 1;
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-apply:hover {
      background: var(--primary-hover);
    }

    .btn-save {
      background: white;
      color: var(--primary);
      border: 1px solid var(--primary);
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:hover {
      background: #f0f7ff;
    }

    /* Empty State */
    .empty-state {
      background: var(--bg-white);
      border-radius: 8px;
      padding: 60px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 64px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Status Alert */
    .status-alert {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-alert.success {
      background: #D1F4E0;
      color: var(--success);
      border: 1px solid var(--success);
    }

    .status-alert.error {
      background: #FDE8E8;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .status-alert.info {
      background: #FFF4E5;
      color: var(--warning);
      border: 1px solid var(--warning);
    }

    /* Loading State */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Paste Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 8px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .modal-close:hover {
      background: var(--bg-gray);
    }

    .modal-body {
      padding: 24px;
    }

    .paste-textarea {
      width: 100%;
      min-height: 300px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      resize: vertical;
    }

    .paste-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(10, 102, 194, 0.1);
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        padding: 0 16px;
      }

      .container {
        padding: 16px;
      }

      .search-section {
        padding: 20px 16px;
      }

      .search-bar {
        flex-direction: column;
      }

      .search-input-wrapper {
        min-width: 100%;
      }

      .filter-select {
        width: 100%;
      }

      .resume-card {
        padding: 24px 16px;
      }

      .upload-area {
        padding: 24px 16px;
      }

      .upload-actions {
        flex-direction: column;
      }

      .upload-actions .btn {
        width: 100%;
        justify-content: center;
      }

      .job-header {
        flex-direction: column;
      }

      .match-score {
        align-self: flex-start;
      }

      .job-actions {
        flex-direction: column;
      }

      .btn-apply,
      .btn-save {
        width: 100%;
      }
    }

    /* Hide file input */
    #resumeFile {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">NaukriChakri</a>
      <div class="header-actions">
        <span id="jobCount" class="jobs-count">0 Jobs</span>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Status Messages -->
    <div id="statusContainer"></div>

    <!-- Search Section -->
    <div class="search-section">
      <h2 class="search-title">Find Your Perfect Job</h2>
      <div class="search-bar">
        <div class="search-input-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input 
            type="search" 
            id="searchInput" 
            class="search-input" 
            placeholder="Search by job title, company, or skills..."
          >
        </div>
        <select id="locationFilter" class="filter-select">
          <option value="">All Locations</option>
        </select>
        <select id="typeFilter" class="filter-select">
          <option value="">All Job Types</option>
        </select>
        <select id="sortSelect" class="filter-select">
          <option value="new">Latest First</option>
          <option value="old">Oldest First</option>
        </select>
      </div>
    </div>

    <!-- Resume Upload Card -->
    <div class="resume-card">
      <h2 class="resume-card-title">Get Personalized Job Matches</h2>
      <p class="resume-card-subtitle">Upload your resume and let AI find the best opportunities for you</p>
      
      <input type="file" id="resumeFile" accept=".pdf,.txt,.doc,.docx,application/pdf" />
      
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">
          <i class="fas fa-cloud-upload-alt"></i>
        </div>
        <div class="upload-text">Click to upload or drag and drop</div>
        <div class="upload-hint">PDF, DOC, TXT (Max 5MB)</div>
      </div>

      <div id="fileNameDisplay" class="file-name-display"></div>

      <div class="upload-actions">
        <button id="analyzeBtn" class="btn btn-primary" disabled>
          <i class="fas fa-magic"></i>
          Analyze Resume
        </button>
        <button id="pasteBtn" class="btn btn-secondary">
          <i class="fas fa-paste"></i>
          Paste Resume Text
        </button>
      </div>
    </div>

    <!-- Analysis Section -->
    <div class="analysis-section" id="analysisSection">
      <div class="analysis-header" style="cursor: pointer;" id="analysisHeader">
        <h3 class="analysis-title">
          <i class="fas fa-robot"></i> AI Analysis Results
        </h3>
        <div style="display: flex; gap: 12px; align-items: center;">
          <span id="matchCount" class="match-count">0 Matches</span>
          <button id="toggleAnalysis" class="btn-toggle">
            <i class="fas fa-chevron-up"></i>
          </button>
        </div>
      </div>
      <div id="analysisContent" class="analysis-content">
        Analyzing your resume...
      </div>
    </div>

    <!-- Jobs Section -->
    <div class="jobs-header">
      <h2 class="jobs-title" id="jobsTitle">Available Jobs</h2>
    </div>
    <div id="jobsGrid" class="jobs-grid">
      <!-- Jobs will be inserted here -->
    </div>
  </div>

  <!-- Paste Modal -->
  <div class="modal" id="pasteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Paste Your Resume</h3>
        <button class="modal-close" id="modalClose">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <textarea 
          id="pasteTextarea" 
          class="paste-textarea" 
          placeholder="Paste your resume text here..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelPaste">Cancel</button>
        <button class="btn btn-primary" id="analyzePasted">Analyze Resume</button>
      </div>
    </div>
  </div>

  <!-- PDF.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    // Configure PDF.js
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // Configuration
    const SHEET_ID = '1X412u-aXPAzkKqwRn0PgvbjcWMaivWJx-FlyHb6LARc';
    const GID = '0';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

    // Global state
    let allJobs = [];
    let matchedJobs = [];
    let selectedFile = null;

    // DOM Elements
    const elements = {
      resumeFile: document.getElementById('resumeFile'),
      uploadArea: document.getElementById('uploadArea'),
      fileNameDisplay: document.getElementById('fileNameDisplay'),
      analyzeBtn: document.getElementById('analyzeBtn'),
      pasteBtn: document.getElementById('pasteBtn'),
      pasteModal: document.getElementById('pasteModal'),
      pasteTextarea: document.getElementById('pasteTextarea'),
      modalClose: document.getElementById('modalClose'),
      cancelPaste: document.getElementById('cancelPaste'),
      analyzePasted: document.getElementById('analyzePasted'),
      searchInput: document.getElementById('searchInput'),
      locationFilter: document.getElementById('locationFilter'),
      typeFilter: document.getElementById('typeFilter'),
      sortSelect: document.getElementById('sortSelect'),
      jobsGrid: document.getElementById('jobsGrid'),
      analysisSection: document.getElementById('analysisSection'),
      analysisHeader: document.getElementById('analysisHeader'),
      analysisContent: document.getElementById('analysisContent'),
      toggleAnalysis: document.getElementById('toggleAnalysis'),
      matchCount: document.getElementById('matchCount'),
      statusContainer: document.getElementById('statusContainer'),
      jobCount: document.getElementById('jobCount')
    };

    // Toggle analysis section
    elements.analysisHeader.addEventListener('click', () => {
      elements.analysisSection.classList.toggle('collapsed');
    });

    // Utility Functions
    function showStatus(message, type = 'info') {
      const alert = document.createElement('div');
      alert.className = `status-alert ${type}`;
      
      const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
      alert.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
      
      elements.statusContainer.appendChild(alert);
      
      setTimeout(() => {
        alert.style.animation = 'slideDown 0.3s ease reverse';
        setTimeout(() => alert.remove(), 300);
      }, 5000);
    }

    // Extract text from PDF
    async function extractTextFromPDF(file) {
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = '';
        
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(' ');
          fullText += pageText + ' ';
        }
        
        return fullText.trim();
      } catch (error) {
        console.error('PDF extraction error:', error);
        throw new Error('Could not extract text from PDF');
      }
    }

    // Fetch jobs from Google Sheets
    async function fetchJobs() {
      try {
        const response = await fetch(SHEET_URL);
        const text = await response.text();
        const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf(')'));
        const data = JSON.parse(jsonText);
        
        const cols = data.table.cols.map(c => (c.label || '').trim());
        const rows = data.table.rows.map(row => 
          row.c ? row.c.map(cell => cell ? cell.v : '') : []
        );
        
        const jobs = rows
          .map(row => {
            const obj = {};
            cols.forEach((col, i) => {
              obj[col || `col${i}`] = row[i] || '';
            });
            return obj;
          })
          .filter(job => job['Company'] && String(job['Company']).trim() !== '');
        
        return jobs;
      } catch (error) {
        console.error('Error fetching jobs:', error);
        throw new Error('Failed to load jobs');
      }
    }

    // Extract keywords from resume
    function extractKeywords(text, topN = 30) {
      if (!text) return [];
      const stopWords = new Set(['which', 'that', 'with', 'this', 'from', 'your', 'about', 
        'their', 'have', 'will', 'they', 'would', 'there', 'these', 'those']);
      
      const words = text.toLowerCase().match(/\b[a-zA-Z0-9+#.+-]{4,}\b/g) || [];
      const freq = {};
      
      words.forEach(w => {
        if (!stopWords.has(w)) {
          freq[w] = (freq[w] || 0) + 1;
        }
      });
      
      return Object.entries(freq)
        .sort((a, b) => b[1] - a[1])
        .slice(0, topN)
        .map(x => x[0]);
    }

    // Score job based on keywords
    function scoreJob(job, keywords) {
      if (!keywords || keywords.length === 0) return 0;
      
      const haystack = `${job.Company || ''} ${job.Role || ''} ${job.Description || ''} ${job.JobType || ''}`.toLowerCase();
      let score = 0;
      
      keywords.forEach(keyword => {
        if (haystack.includes(keyword)) {
          score += 1;
        }
      });
      
      if (job.Role) {
        const roleWords = job.Role.toLowerCase().split(/\s+/);
        roleWords.forEach(word => {
          if (keywords.includes(word)) {
            score += 0.5;
          }
        });
      }
      
      return score;
    }

    // Call AI API
    async function analyzeResume(resumeText) {
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resume: resumeText })
      });
      
      if (!response.ok) {
        const error = await response.json().catch(() => ({ message: 'Analysis failed' }));
        throw new Error(error.message || 'Failed to analyze resume');
      }
      
      const data = await response.json();
      return data.result || '';
    }

    // Render jobs
    function renderJobs(jobs, matchScores = {}) {
      if (!jobs || jobs.length === 0) {
        elements.jobsGrid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-briefcase"></i></div>
            <h3 class="empty-title">No jobs found</h3>
            <p class="empty-text">Try adjusting your search or filters</p>
          </div>
        `;
        return;
      }

      // Check if we have any match scores
      const hasMatches = Object.keys(matchScores).length > 0;

      // Sort jobs
      const sortedJobs = [...jobs].sort((a, b) => {
        const keyA = a.Company + a.Role;
        const keyB = b.Company + b.Role;
        const scoreA = matchScores[keyA] || 0;
        const scoreB = matchScores[keyB] || 0;

        if (hasMatches) {
          // If we have match scores, sort by score (highest first)
          if (scoreB !== scoreA) {
            return scoreB - scoreA;
          }
        }
        
        // For jobs with same score or no matches, maintain original order
        return 0;
      });

      elements.jobsGrid.innerHTML = sortedJobs.map(job => {
        const key = job.Company + job.Role;
        const score = matchScores[key] || 0;
        const isMatched = score > 0;
        
        return `
          <div class="job-card ${isMatched ? 'matched' : ''}">
            <div class="job-header">
              <div class="job-info">
                <div class="company-name">${job.Company || 'Company'}</div>
                <div class="role-title">${job.Role || 'Position'}</div>
              </div>
              ${isMatched ? `<div class="match-score"><i class="fas fa-check-circle"></i> ${Math.round(score)}% Match</div>` : ''}
            </div>
            
            <div class="job-meta">
              ${job.Location ? `
                <div class="job-meta-item">
                  <i class="fas fa-map-marker-alt"></i>
                  ${job.Location}
                </div>
              ` : ''}
              ${job.Stipend ? `
                <div class="job-meta-item">
                  <i class="fas fa-rupee-sign"></i>
                  ${job.Stipend}
                </div>
              ` : ''}
              ${job.JobType ? `
                <div class="job-meta-item">
                  <i class="fas fa-briefcase"></i>
                  ${job.JobType}
                </div>
              ` : ''}
            </div>
            
            ${job.Description ? `
              <div class="job-description">
                ${job.Description.slice(0, 150)}${job.Description.length > 150 ? '...' : ''}
              </div>
            ` : ''}
            
            <div class="job-actions">
              ${job.ApplyLink ? `
                <a href="${job.ApplyLink}" target="_blank" class="btn-apply">
                  <i class="fas fa-paper-plane"></i> Apply Now
                </a>
              ` : ''}
              ${job.Email ? `
                <a href="mailto:${job.Email}" class="btn-save">
                  <i class="fas fa-envelope"></i> Email
                </a>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
      
      // Update jobs title based on matches
      const matchedCount = Object.keys(matchScores).filter(key => matchScores[key] > 0).length;
      const jobsTitle = document.getElementById('jobsTitle');
      
      if (matchedCount > 0) {
        jobsTitle.innerHTML = `<i class="fas fa-star" style="color: var(--primary);"></i> Your Top Matches <span style="color: var(--primary); font-weight: 800;">(${matchedCount})</span> & All Jobs`;
        console.log(`Displaying ${matchedCount} matched jobs sorted by relevance`);
      } else {
        jobsTitle.innerHTML = 'Available Jobs';
      }
    }

    // Populate filters
    function populateFilters(jobs) {
      const locations = new Set();
      const types = new Set();
      
      jobs.forEach(job => {
        if (job.Location) locations.add(job.Location);
        if (job.JobType) types.add(job.JobType);
      });
      
      elements.locationFilter.innerHTML = '<option value="">All Locations</option>' +
        Array.from(locations).sort().map(loc => 
          `<option value="${loc}">${loc}</option>`
        ).join('');
      
      elements.typeFilter.innerHTML = '<option value="">All Job Types</option>' +
        Array.from(types).sort().map(type => 
          `<option value="${type}">${type}</option>`
        ).join('');
    }

    // Apply filters
    function applyFilters() {
      const query = elements.searchInput.value.toLowerCase();
      const location = elements.locationFilter.value;
      const type = elements.typeFilter.value;
      const sort = elements.sortSelect.value;
      
      let filtered = allJobs.filter(job => {
        const haystack = `${job.Company} ${job.Role} ${job.Location} ${job.Description}`.toLowerCase();
        const matchesQuery = !query || haystack.includes(query);
        const matchesLocation = !location || job.Location === location;
        const matchesType = !type || job.JobType === type;
        
        return matchesQuery && matchesLocation && matchesType;
      });
      
      filtered.sort((a, b) => {
        const dateA = new Date(a.PostedDate || 0);
        const dateB = new Date(b.PostedDate || 0);
        return sort === 'old' ? dateA - dateB : dateB - dateA;
      });
      
      renderJobs(filtered, matchedJobs);
      elements.jobCount.textContent = `${filtered.length} Jobs`;
    }

    // Handle file upload
    elements.uploadArea.addEventListener('click', () => {
      elements.resumeFile.click();
    });

    elements.resumeFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        selectedFile = file;
        elements.fileNameDisplay.textContent = `Selected: ${file.name}`;
        elements.fileNameDisplay.style.display = 'block';
        elements.analyzeBtn.disabled = false;
      }
    });

    // Drag and drop
    elements.uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      elements.uploadArea.classList.add('dragover');
    });

    elements.uploadArea.addEventListener('dragleave', () => {
      elements.uploadArea.classList.remove('dragover');
    });

    elements.uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      elements.uploadArea.classList.remove('dragover');
      
      const file = e.dataTransfer.files[0];
      if (file) {
        selectedFile = file;
        elements.resumeFile.files = e.dataTransfer.files;
        elements.fileNameDisplay.textContent = `Selected: ${file.name}`;
        elements.fileNameDisplay.style.display = 'block';
        elements.analyzeBtn.disabled = false;
      }
    });

    // Analyze button
    elements.analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      
      const originalText = elements.analyzeBtn.innerHTML;
      elements.analyzeBtn.innerHTML = '<span class="loading"></span> Analyzing...';
      elements.analyzeBtn.disabled = true;
      
      try {
        let text;
        
        if (selectedFile.type === 'application/pdf' || selectedFile.name.toLowerCase().endsWith('.pdf')) {
          showStatus('Extracting text from PDF...', 'info');
          text = await extractTextFromPDF(selectedFile);
        } else {
          text = await selectedFile.text();
        }
        
        if (!text || text.trim().length < 10) {
          throw new Error('File appears to be empty');
        }
        
        elements.analysisSection.classList.add('active');
        elements.analysisContent.textContent = 'Analyzing your resume with AI...';
        
        const analysis = await analyzeResume(text);
        elements.analysisContent.textContent = analysis;
        
        // Calculate matches using BOTH resume text AND AI analysis
        const combinedText = text + ' ' + analysis;
        const keywords = extractKeywords(combinedText, 50);
        
        console.log('Keywords extracted:', keywords);
        
        const scored = allJobs.map(job => {
          const score = scoreJob(job, keywords);
          return { job, score };
        });
        
        scored.sort((a, b) => b.score - a.score);
        
        // Show ALL jobs but highlight top matches
        const topMatches = scored.filter(s => s.score > 0);
        
        console.log('Top matches found:', topMatches.length);
        
        matchedJobs = {};
        topMatches.forEach(item => {
          const key = item.job.Company + item.job.Role;
          matchedJobs[key] = Math.min(100, item.score * 8); // Scale to percentage
        });
        
        elements.matchCount.textContent = `${topMatches.length} Matches`;
        
        // Render ALL jobs with match scores
        renderJobs(allJobs, matchedJobs);
        
        showStatus('Resume analyzed successfully! Scroll down to see matched jobs.', 'success');
        
        // Auto-collapse analysis after 2 seconds and scroll to jobs
        setTimeout(() => {
          elements.analysisSection.classList.add('collapsed');
          
          // Scroll to first matched job
          setTimeout(() => {
            const firstMatchedJob = document.querySelector('.job-card.matched');
            if (firstMatchedJob) {
              firstMatchedJob.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
              const firstJob = document.querySelector('.job-card');
              if (firstJob) {
                firstJob.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
            }
          }, 400);
        }, 2000);
        
      } catch (error) {
        console.error(error);
        showStatus(error.message || 'Analysis failed', 'error');
        elements.analysisContent.textContent = `Error: ${error.message}\n\nPlease try again or use the paste option.`;
      } finally {
        elements.analyzeBtn.innerHTML = originalText;
        elements.analyzeBtn.disabled = false;
      }
    });

    // Paste modal
    elements.pasteBtn.addEventListener('click', () => {
      elements.pasteModal.classList.add('active');
      elements.pasteTextarea.focus();
    });

    elements.modalClose.addEventListener('click', () => {
      elements.pasteModal.classList.remove('active');
    });

    elements.cancelPaste.addEventListener('click', () => {
      elements.pasteModal.classList.remove('active');
    });

    elements.analyzePasted.addEventListener('click', async () => {
      const text = elements.pasteTextarea.value.trim();
      if (!text) {
        showStatus('Please paste your resume text', 'error');
        return;
      }
      
      elements.pasteModal.classList.remove('active');
      
      const originalText = elements.analyzeBtn.innerHTML;
      elements.analyzeBtn.innerHTML = '<span class="loading"></span> Analyzing...';
      elements.analyzeBtn.disabled = true;
      
      try {
        elements.analysisSection.classList.add('active');
        elements.analysisContent.textContent = 'Analyzing your resume with AI...';
        
        const analysis = await analyzeResume(text);
        elements.analysisContent.textContent = analysis;
        
        // Calculate matches using BOTH resume text AND AI analysis
        const combinedText = text + ' ' + analysis;
        const keywords = extractKeywords(combinedText, 50);
        
        console.log('Keywords extracted:', keywords);
        
        const scored = allJobs.map(job => {
          const score = scoreJob(job, keywords);
          return { job, score };
        });
        
        scored.sort((a, b) => b.score - a.score);
        const topMatches = scored.filter(s => s.score > 0);
        
        console.log('Top matches found:', topMatches.length);
        
        matchedJobs = {};
        topMatches.forEach(item => {
          const key = item.job.Company + item.job.Role;
          matchedJobs[key] = Math.min(100, item.score * 8);
        });
        
        elements.matchCount.textContent = `${topMatches.length} Matches`;
        
        // Render ALL jobs with match scores
        renderJobs(allJobs, matchedJobs);
        
        showStatus('Resume analyzed successfully! Scroll down to see matched jobs.', 'success');
        
        // Auto-collapse analysis after 2 seconds and scroll to jobs
        setTimeout(() => {
          elements.analysisSection.classList.add('collapsed');
          
          setTimeout(() => {
            const firstMatchedJob = document.querySelector('.job-card.matched');
            if (firstMatchedJob) {
              firstMatchedJob.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
              const firstJob = document.querySelector('.job-card');
              if (firstJob) {
                firstJob.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
            }
          }, 400);
        }, 2000);
        
      } catch (error) {
        console.error(error);
        showStatus(error.message || 'Analysis failed', 'error');
        elements.analysisContent.textContent = `Error: ${error.message}\n\nPlease try again.`;
      } finally {
        elements.analyzeBtn.innerHTML = originalText;
        elements.analyzeBtn.disabled = false;
      }
    });

    // Search and filters
    [elements.searchInput, elements.locationFilter, elements.typeFilter, elements.sortSelect].forEach(el => {
      el.addEventListener('input', applyFilters);
    });

    // Initialize
    async function init() {
      elements.jobsGrid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><span class="loading"></span></div>
          <h3 class="empty-title">Loading jobs...</h3>
        </div>
      `;
      
      try {
        allJobs = await fetchJobs();
        populateFilters(allJobs);
        applyFilters();
        showStatus(`Successfully loaded ${allJobs.length} jobs!`, 'success');
      } catch (error) {
        elements.jobsGrid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h3 class="empty-title">Failed to load jobs</h3>
            <p class="empty-text">Please check your internet connection and refresh the page</p>
          </div>
        `;
        showStatus('Failed to load jobs', 'error');
      }
    }

    init();
  </script>
</body>
</html>
