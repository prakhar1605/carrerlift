  <style>
    /* ===== Design System ===== */

    /* ===== Search & Filter Bar ===== */

    /* ===== Job Card with 3D Effect ===== */

      animation: cardFadeIn 0.5s ease-out forwards;

    @keyframes cardFadeIn {

        transform: translateY(20px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

    .job-card::before {

          <span class="footer-link">More Features Coming Soon</span>
        </div>
        <p style="margin-top: 20px; font-size: 14px;">
          Founded by <a href="https://www.linkedin.com/in/prakhar-pandey-56267a2a2/" target="_blank" rel="noopener noreferrer" style="color: var(--primary); text-decoration: none; font-weight: 600; transition: color 0.3s ease;">Prakhar Pandey</a>
        </p>

  <script>
    /***** CONFIGURATION *****/
    const SHEET_ID = '1X412u-aXPAzkKqwRn0PgvbjcWMaivWJx-FlyHb6LARc';
    const GID = '0';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

    /***** FETCH & PARSE GOOGLE SHEET DATA *****/
    async function fetchSheet() {
      try {
        const response = await fetch(SHEET_URL);
        const text = await response.text();
        const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf(')'));
        const data = JSON.parse(jsonText);
        
        const columns = data.table.cols.map(col => col.label || '');
        const rows = data.table.rows.map(row => 
          row.c ? row.c.map(cell => cell ? cell.v : '') : []
        );
        
        const items = rows
          .map(row => {
            const obj = {};
            columns.forEach((col, idx) => {
              obj[col.trim()] = row[idx] || '';
            });
            return obj;
          })
          .filter(item => item.Company && item.Company.trim() !== '');
        
        return items;
      } catch (error) {
        console.error('Error fetching sheet:', error);
        throw error;
      }
    }

    /***** DATE PARSING *****/
    function parseDate(dateString) {
      if (!dateString) return 0;
      
      const timestamp = Date.parse(dateString);
      if (!isNaN(timestamp)) return timestamp;
      
      const parts = dateString.trim().split(/[-/ ,]+/).filter(Boolean);
      if (parts.length >= 3) {
        const day = parseInt(parts[0]);
        const monthMap = {
          'jan': 0, 'feb': 1, 'mar': 2, 'apr': 3, 'may': 4, 'jun': 5,
          'jul': 6, 'aug': 7, 'sep': 8, 'oct': 9, 'nov': 10, 'dec': 11
        };
        const month = monthMap[parts[1].substring(0, 3).toLowerCase()] || 0;
        const year = parseInt(parts[2]);
        const date = new Date(year, month, day);
        if (!isNaN(date)) return date.getTime();
      }
      
      return 0;
    }

    /***** CREATE JOB CARD WITH 3D EFFECT *****/
    function createJobCard(job, index) {
      const card = document.createElement('div');
      card.className = 'job-card';
      card.style.animationDelay = `${index * 0.1}s`;
      card.setAttribute('role', 'listitem');
      
      // Company initial for logo
      const initial = job.Company.charAt(0).toUpperCase();
      
      // Smart button logic
      let buttonsHTML = '';
      
      // If Apply Link exists, show Apply button
      if (job.ApplyLink) {
        buttonsHTML += `
          <a href="${job.ApplyLink}" 
             target="_blank" 
             rel="noopener noreferrer" 
             class="btn btn-primary">
            Apply Now →
          </a>
        `;
      }
      // If no Apply Link but Email exists, show Email as primary
      else if (job.Email) {
        buttonsHTML += `
          <a href="mailto:${job.Email}?subject=${encodeURIComponent(`Application for ${job.Role} at ${job.Company}`)}&body=${encodeURIComponent('Hi,\n\nI would like to apply for this position. Please find my resume attached.\n\nBest regards')}" 
             class="btn btn-primary">
            📧 Send CV via Email
          </a>
        `;
      }
      
      // Always show WhatsApp if available
      if (job.WhatsApp) {
        const cleanPhone = String(job.WhatsApp).replace(/[^0-9]/g, '');
        if (cleanPhone.length >= 8) {
          buttonsHTML += `
            <a href="https://wa.me/${cleanPhone}?text=${encodeURIComponent(`Hi, I'm interested in the ${job.Role} position at ${job.Company}`)}" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="btn btn-whatsapp">
              WhatsApp
            </a>
          `;
        }
      }
      
      card.innerHTML = `
        <div class="card-glow"></div>
        <div class="company-header">
          <div>
            <h3 class="company-name">${job.Company}</h3>
            <div class="job-type-badge">${job.JobType || 'Job'}</div>
          </div>
          <div class="company-logo">${initial}</div>
        </div>
        
        <h4 class="role-title">${job.Role || 'Position Available'}</h4>
        
        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-icon">📍</span>
            <span>${job.Location || 'Location TBD'}</span>
          </div>
          ${job.Stipend ? `
            <div class="meta-item">
              <span class="meta-icon">💰</span>
              <span class="stipend-highlight">${job.Stipend}</span>
            </div>
          ` : ''}
        </div>
        
        ${buttonsHTML ? `<div class="action-buttons">${buttonsHTML}</div>` : ''}
        
        ${job.PostedDate ? `
          <div class="posted-date">
            <span>🕒</span>
            <span>Posted: ${job.PostedDate}</span>
          </div>
        ` : ''}
      `;
      
      // 3D Tilt Effect on Mouse Move
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = (y - centerY) / centerY * -10;
        const rotateY = (x - centerX) / centerX * 10;
        
        card.style.setProperty('--rx', `${rotateX}deg`);
        card.style.setProperty('--ry', `${rotateY}deg`);
        card.style.setProperty('--mouse-x', `${(x / rect.width) * 100}%`);
        card.style.setProperty('--mouse-y', `${(y / rect.height) * 100}%`);
      });
      
      card.addEventListener('mouseleave', () => {
        card.style.setProperty('--rx', '0deg');
        card.style.setProperty('--ry', '0deg');
      });
      
      return card;
    }

    /***** RENDER JOBS *****/
    function renderJobs(jobs) {
      const grid = document.getElementById('grid');
      const countEl = document.getElementById('count');
      
      grid.innerHTML = '';
      countEl.textContent = jobs.length;
      
      if (jobs.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <h3>No jobs found</h3>
            <p>Try adjusting your search filters or check back later for new opportunities</p>
          </div>
        `;
        return;
      }
      
      jobs.forEach((job, index) => {
        const card = createJobCard(job, index);
        grid.appendChild(card);
      });
    }

    /***** POPULATE FILTER DROPDOWNS *****/
    function populateFilters(jobs) {
      const locations = new Set();
      const types = new Set();
      
      jobs.forEach(job => {
        if (job.Location) locations.add(job.Location);
        if (job.JobType) types.add(job.JobType);
      });
      
      // Location filter
      const locationFilter = document.getElementById('locationFilter');
      locationFilter.innerHTML = '<option value="">All Locations</option>';
      Array.from(locations).sort().forEach(loc => {
        const option = document.createElement('option');
        option.value = loc;
        option.textContent = loc;
        locationFilter.appendChild(option);
      });
      
      // Type filter
      const typeFilter = document.getElementById('typeFilter');
      typeFilter.innerHTML = '<option value="">All Job Types</option>';
      Array.from(types).sort().forEach(type => {
        const option = document.createElement('option');
        option.value = type;
        option.textContent = type;
        typeFilter.appendChild(option);
      });
    }

    /***** SETUP SEARCH & FILTER CONTROLS *****/
    function setupControls(allJobs) {
      const searchInput = document.getElementById('search');
      const locationFilter = document.getElementById('locationFilter');
      const typeFilter = document.getElementById('typeFilter');
      const sortSelect = document.getElementById('sortSelect');
      
      function applyFilters() {
        const searchQuery = searchInput.value.trim().toLowerCase();
        const selectedLocation = locationFilter.value;
        const selectedType = typeFilter.value;
        const sortOrder = sortSelect.value;
        
        // Filter jobs
        let filtered = allJobs.filter(job => {
          const searchText = `${job.Company} ${job.Role} ${job.Location} ${job.Stipend}`.toLowerCase();
          const matchesSearch = !searchQuery || searchText.includes(searchQuery);
          const matchesLocation = !selectedLocation || job.Location === selectedLocation;
          const matchesType = !selectedType || job.JobType === selectedType;
          
          return matchesSearch && matchesLocation && matchesType;
        });
        
        // Sort jobs
        filtered.sort((a, b) => {
          const dateA = parseDate(a.PostedDate);
          const dateB = parseDate(b.PostedDate);
          return sortOrder === 'old' ? dateA - dateB : dateB - dateA;
        });
        
        renderJobs(filtered);
      }
      
      searchInput.addEventListener('input', applyFilters);
      locationFilter.addEventListener('change', applyFilters);
      typeFilter.addEventListener('change', applyFilters);
      sortSelect.addEventListener('change', applyFilters);
      
      // Initial render
      applyFilters();
    }

    /***** MAIN INITIALIZATION *****/
    async function init() {
      const grid = document.getElementById('grid');
      
      try {
        // Show loading state
        grid.innerHTML = `
          <div class="empty-state">
            <div class="loading-spinner"></div>
            <h3 style="margin-top: 24px;">Loading amazing opportunities...</h3>
          </div>
        `;
        
        // Fetch jobs from Google Sheet
        const jobs = await fetchSheet();
        
        // Populate filters and setup controls
        populateFilters(jobs);
        setupControls(jobs);
        
      } catch (error) {
        console.error('Failed to load jobs:', error);
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <h3>Unable to load jobs</h3>
            <p>Please ensure your Google Sheet is published to web and shared publicly.</p>
            <p style="margin-top: 12px; font-size: 13px; color: var(--text-muted);">${error.message}</p>
          </div>
        `;
      }
    }

    // Start the app
    init();
  </script>
</body>
</html>
